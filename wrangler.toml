"$schema" = "./node_modules/wrangler/config-schema.json"

name = "modernized-visions-saas-template"
main = ".open-next/worker.js"
compatibility_date = "2026-05-16"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Keep production variables and secrets in the Cloudflare dashboard.
# `keep_vars = true` preserves dashboard-managed text variables during deploys.
# `npm run cf:deploy` also passes `--keep-vars` as a CLI safeguard.
#
# Wrangler-managed D1 binding for this app.
[[d1_databases]]
binding = "DB"
database_name = "bidding-dashboard-db"
database_id = "e57b6da5-8706-40e2-b0b3-60018f9c4007"
